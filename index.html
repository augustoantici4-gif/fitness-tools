<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora IMC Pro</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 8px;
    margin: 8px 0;
}

button {
    background: #2c5364;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #203a43;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Calculadora IMC</h1>
    <input type="number" id="altura" placeholder="Altura en cm">
    <input type="number" id="peso" placeholder="Peso en kg">
    <button onclick="calcularIMC()">Calcular</button>
    <div class="result" id="resultado"></div>
</div>

<script>
function calcularIMC() {
    let altura = document.getElementById("altura").value / 100;
    let peso = document.getElementById("peso").value;
    let imc = peso / (altura * altura);
    imc = imc.toFixed(2);

    let mensaje = "";
    let color = "";

    if (imc < 18.5) {
        mensaje = "Bajo peso";
        color = "orange";
    } else if (imc < 25) {
        mensaje = "Peso normal";
        color = "green";
    } else if (imc < 30) {
        mensaje = "Sobrepeso";
        color = "red";
    } else {
        mensaje = "Obesidad";
        color = "darkred";
    }

    let resultado = document.getElementById("resultado");
    resultado.innerHTML = "Tu IMC es: " + imc + "<br>" + mensaje;
    resultado.style.color = color;
}
</script>

</body>
</html>
