<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Salud Completa</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:20px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin:5px;
}

button{
background:#007bff;
color:white;
padding:10px;
border:none;
width:100%;
margin-top:10px;
}

.result{
margin-top:20px;
background:#eee;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div>ESPACIO PARA ANUNCIO</div>

<div class="container">

<h2>Calculadora de Salud</h2>

<input id="peso" placeholder="Peso (kg)">
<input id="altura" placeholder="Altura (cm)">
<input id="edad" placeholder="Edad">

<select id="sexo">
<option value="hombre">Hombre</option>
<option value="mujer">Mujer</option>
</select>

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div>

</div>

<div>ESPACIO PARA ANUNCIO</div>

<script>
function calcular(){

let peso = document.getElementById("peso").value;
let altura = document.getElementById("altura").value/100;
let edad = document.getElementById("edad").value;
let sexo = document.getElementById("sexo").value;

let imc = peso/(altura*altura);

let bmr;

if(sexo=="hombre"){
bmr = 10*peso + 6.25*(altura*100) - 5*edad + 5;
}else{
bmr = 10*peso + 6.25*(altura*100) - 5*edad -161;
}

let calorias = bmr*1.55;
let agua = peso*0.035;

document.getElementById("resultado").innerHTML=
"IMC: "+imc.toFixed(2)+"<br>"+
"Calorías diarias: "+Math.round(calorias)+" kcal<br>"+
"Agua recomendada: "+agua.toFixed(2)+" L";
}
</script>

</body>
</html>
